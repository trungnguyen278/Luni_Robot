dependencies:
  78/esp-opus: ">=1.0.0"
  # Camera (Freenove ESP32-S3-WROOM CAM / OV2640). Paired with -DLUNI_ENABLE_CAMERA.
  espressif/esp32-camera: "^2.0.0"
  # On-device wake word ("Hi Luni"): TFLite-Micro runtime + bundled audio
  # microfrontend (spectrogram). Paired with -DLUNI_ENABLE_WAKEWORD.
  # Pinned to 1.2.0: it is the last release that still ships the experimental
  # microfrontend C lib (tensorflow/lite/experimental/microfrontend/lib). 1.3.0+
  # dropped it for the signal/ ops, which do NOT reproduce microWakeWord's
  # pymicro-features frontend that the "Hi Luni" model was trained on.
  esp-tflite-micro: "==1.2.0"
